<svg width="680" height="380" viewBox="0 0 680 380" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Currency Converter — режим курсов</title>
<desc>Терминал показывает курсы USD к RUB, EUR и GBP</desc>
<defs>
  <style>
    .mono { font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace; font-size: 13px; }
  </style>
</defs>
<rect width="680" height="380" rx="12" fill="#1a1b26"/>
<rect x="1" y="1" width="678" height="378" rx="11" fill="none" stroke="#414868" stroke-width="1"/>
<rect x="0" y="0" width="680" height="38" rx="12" fill="#16161e"/>
<rect x="0" y="26" width="680" height="12" fill="#16161e"/>
<circle cx="24" cy="19" r="6" fill="#ff5f57"/>
<circle cx="44" cy="19" r="6" fill="#ffbd2e"/>
<circle cx="64" cy="19" r="6" fill="#28c940"/>
<text x="340" y="23" text-anchor="middle" class="mono" fill="#565f89" font-size="12">python cli.py</text>
<text x="32" y="68" class="mono" fill="#bb9af7" font-weight="700" font-size="14">╔══════════════════════════════════╗</text>
<text x="32" y="84" class="mono" fill="#bb9af7" font-weight="700" font-size="14">║     Конвертер валют  v1.0        ║</text>
<text x="32" y="100" class="mono" fill="#bb9af7" font-weight="700" font-size="14">╚══════════════════════════════════╝</text>
<text x="32" y="124" class="mono" fill="#c0caf5">  <tspan fill="#565f89">1</tspan>  Курсы валют для базовой валюты</text>
<text x="32" y="140" class="mono" fill="#c0caf5">  <tspan fill="#565f89">2</tspan>  Конвертировать сумму</text>
<text x="32" y="156" class="mono" fill="#c0caf5">  <tspan fill="#565f89">0</tspan>  Выход</text>
<text x="32" y="180" class="mono"><tspan fill="#565f89">Ваш выбор: </tspan><tspan fill="#7aa2f7">1</tspan></text>
<text x="32" y="196" class="mono"><tspan fill="#565f89">  Введите базовую валюту: </tspan><tspan fill="#7aa2f7">USD</tspan></text>
<text x="32" y="220" class="mono"><tspan fill="#7dcfff">🌐 </tspan><tspan fill="#9ece6a">Запрашиваю свежие данные для USD...</tspan></text>
<text x="32" y="236" class="mono"><tspan fill="#7dcfff">✅ </tspan><tspan fill="#9ece6a">Данные сохранены в «currency_rate.json».</tspan></text>
<text x="32" y="260" class="mono" fill="#414868">──────────────────────────────────────────</text>
<text x="32" y="277" class="mono">  <tspan fill="#565f89">Базовая валюта :</tspan> <tspan fill="#e0af68">USD</tspan></text>
<text x="32" y="293" class="mono">  <tspan fill="#565f89">Обновлено      :</tspan> <tspan fill="#7dcfff">Mon, 14 Apr 2025 00:02:31 +0000</tspan></text>
<text x="32" y="309" class="mono" fill="#414868">──────────────────────────────────────────</text>
<text x="32" y="326" class="mono">  <tspan fill="#c0caf5">1 USD  =</tspan>  <tspan fill="#9ece6a" font-weight="700">    90.5200</tspan>  <tspan fill="#e0af68">RUB</tspan></text>
<text x="32" y="342" class="mono">  <tspan fill="#c0caf5">1 USD  =</tspan>  <tspan fill="#9ece6a" font-weight="700">     0.9302</tspan>  <tspan fill="#e0af68">EUR</tspan></text>
<text x="32" y="358" class="mono">  <tspan fill="#c0caf5">1 USD  =</tspan>  <tspan fill="#9ece6a" font-weight="700">     0.7701</tspan>  <tspan fill="#e0af68">GBP</tspan></text>
<text x="32" y="374" class="mono" fill="#414868">──────────────────────────────────────────</text>
</svg>
